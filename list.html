<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Ruang DTGD</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
            min-height: 100vh;
        }
        .list-page-container { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 1200px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            position: relative; 
            display: flex;
            flex-direction: column;
        }
        /* Tombol Fullscreen */
        .btn-fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #edf2f7;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            color: #4a5568;
            transition: 0.3s;
        }
        .btn-fullscreen:hover { background: #e2e8f0; color: #1a3a5f; }
        
        #listTableContainer {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }

        body {
            position: relative;
            z-index: 1;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            
            background-image: url('assets/bg1.jpg'); 
            
            background-size: center;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed; 
            opacity: 0.05; 
            z-index: -1; 
        }

        .list-page-container {
            background: rgba(255, 255, 255, 0.95) !important; 
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="list-page-container" id="mainContainer">
        <button id="btnFullscreen" class="btn-fullscreen" title="Layar Penuh">
            <svg id="iconEnterFS" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            <svg id="iconExitFS" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;"><path d="M4 14h4v4m0-4l-5 5m15-5h-4v4m0-4l5 5M4 10h4V6m0 4l-5-5m15 5h-4V6m0 4l5-5"></path></svg>
        </button>

        <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; margin-top: 10px;">
            <button id="listPrev" class="btn-nav-cal" style="width: 35px; height: 35px; flex-shrink: 0;">&lt;</button>
            
            <div style="text-align: center;">
                <h2 id="listTitle" style="margin: 0; color: #1a3a5f; font-size: 1.8rem; font-weight: 800;">Memuat Data...</h2>
                <div id="listRangeText" style="color: #3b82f6; font-weight: 700; font-size: 1.2rem; margin-top: 5px;">Mohon Tunggu</div>
            </div>

            <button id="listNext" class="btn-nav-cal" style="width: 35px; height: 35px; flex-shrink: 0;">&gt;</button>
        </div>

        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 25px;">
            <button id="btnListWeekly" class="btn-ctrl" style="padding: 8px 20px;">View Mingguan</button>
            <button id="btnListDaily" class="btn-ctrl" style="padding: 8px 20px;">View Harian</button>
        </div>

        <div id="listTableContainer"></div>
    </div>

    <script>
        // 1. Inisialisasi State dari URL
        const urlParams = new URLSearchParams(window.location.search);
        let viewMode = urlParams.get('mode') || 'weekly'; // default weekly
        let anchorDate = urlParams.get('date') ? new Date(urlParams.get('date')) : new Date();
        let allData = [];

        // 2. Setup Fullscreen Logic
        const container = document.documentElement; // Buat seluruh halaman jadi fullscreen
        const btnFs = document.getElementById('btnFullscreen');
        const iconEnter = document.getElementById('iconEnterFS');
        const iconExit = document.getElementById('iconExitFS');

        btnFs.onclick = () => {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
                iconEnter.style.display = 'none';
                iconExit.style.display = 'block';
            } else {
                document.exitFullscreen();
                iconEnter.style.display = 'block';
                iconExit.style.display = 'none';
            }
        };

        // 3. Ambil Data dari Server (Sama seperti index)
        async function fetchData() {
            try {
                // URL INI HARUS SAMA DENGAN GAS ANDA
                const response = await fetch("https://script.google.com/macros/s/AKfycby0o45lQON04p2MpsXxATjiDJIBTL7QccDppkqdey8fUbIpXb2NUt3-5bLj9oMS9eBG/exec?t=" + Date.now());
                const rawData = await response.json();
                
                // Normalisasi
                allData = rawData.map(item => {
                    let dObj;
                    if (typeof item.tanggal === 'string' && item.tanggal.includes('/')) {
                        const [d,m,y] = item.tanggal.split('/');
                        dObj = new Date(y, m-1, d);
                    } else {
                        dObj = new Date(item.tanggal);
                    }
                    dObj.setHours(0,0,0,0);
                    return { ...item, _dateObj: dObj };
                });

                renderView();
            } catch (err) {
                console.error(err);
                document.getElementById('listTitle').innerText = "Gagal memuat data";
                document.getElementById('listRangeText').innerText = "Cek koneksi internet Anda.";
            }
        }

        // 4. Update URL tanpa Refresh Page
        function updateURL() {
            const dateStr = `${anchorDate.getFullYear()}-${String(anchorDate.getMonth()+1).padStart(2,'0')}-${String(anchorDate.getDate()).padStart(2,'0')}`;
            const newUrl = `list.html?mode=${viewMode}&date=${dateStr}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
        }

        // 5. Fungsi Render (Persis seperti di modal)
        function renderView() {
            const curr = new Date(anchorDate);
            const day = curr.getDay();
            let startDate, endDate, titleText;

            if (viewMode === 'weekly') {
                const diff = curr.getDate() - day + (day === 0 ? -6 : 1);
                startDate = new Date(curr.setDate(diff));
                startDate.setHours(0,0,0,0);
                endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + 6);
                endDate.setHours(23,59,59);
                titleText = "List Agenda Mingguan";
            } else {
                startDate = new Date(curr.setHours(0,0,0,0));
                endDate = new Date(curr.setHours(23,59,59));
                titleText = "List Agenda Harian";
            }

            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('listTitle').innerText = titleText;
            document.getElementById('listRangeText').innerText = viewMode === 'weekly'
                ? `${startDate.getDate()} ${monthNames[startDate.getMonth()]} — ${endDate.getDate()} ${monthNames[endDate.getMonth()]} ${endDate.getFullYear()}`
                : `${startDate.getDate()} ${monthNames[startDate.getMonth()]} ${startDate.getFullYear()}`;

            const filteredList = allData.filter(item => {
                if (item.tipePesanan === 'berulang') return false;
                return item._dateObj >= startDate && item._dateObj <= endDate;
            }).sort((a, b) => {
                return a._dateObj - b._dateObj || a.jam.localeCompare(b.jam);
            });

            // HTML TABEL MENGGUNAKAN CSS YANG SAMA
            let tableHtml = `
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem; table-layout: auto;">
                    <thead style="position: sticky; top: 0; background: #f1f5f9; z-index: 10;">
                        <tr>
                            <th style="padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: center; width: 100px;">Hari/Tgl</th>
                            <th style="padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: center; width: 100px;">Waktu</th>
                            <th style="padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: left;">Agenda Acara</th>
                            <th style="padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: center; width: 120px;">Ruang</th>
                            <th style="padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: center; width: 80px;">Peserta</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredList.length > 0 ? filteredList.map(item => {
                            let dObj = item._dateObj;
                            return `
                            <tr style="border-bottom: 1px solid #edf2f7;">
                                <td style="padding: 12px; text-align: center; white-space: nowrap;">
                                    <div style="font-weight: 700; color: #1a3a5f;">${dObj.toLocaleDateString('id-ID', { weekday: 'long' })}</div>
                                    <div style="color: #64748b; font-size: 0.75rem;">${dObj.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit' })}</div>
                                </td>
                                <td style="padding: 12px; text-align: center; white-space: nowrap;">
                                    <span style="background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: 600;">${item.jam}</span>
                                </td>
                                <td style="padding: 12px; text-align: left; vertical-align: top;">
                                    <div style="font-weight: 600; color: #1e293b; line-height: 1.3; font-size: 1rem;">${item.acara}</div>
                                    <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 4px;">PIC: ${item.pic}</div>
                                </td>
                                <td style="padding: 12px; text-align: center; white-space: nowrap;">
                                    <span style="background: #e0f2fe; color: #0369a1; padding: 4px 10px; border-radius: 12px; font-weight: 700; font-size: 0.75rem; border: 1px solid #bae6fd; display: inline-block;">
                                        ${item.ruang}
                                    </span>
                                </td>
                                <td style="padding: 12px; text-align: center; color: #718096; font-style: italic;">
                                    ${item.peserta || '-'}
                                </td>
                            </tr>`;
                        }).join('') : `<tr><td colspan="5" style="padding: 40px; text-align: center; color: #94a3b8; font-size: 1.1rem;">Tidak ada agenda pada rentang waktu ini.</td></tr>`}
                    </tbody>
                </table>`;

            document.getElementById('listTableContainer').innerHTML = tableHtml;

            // Update Style Tombol
            document.getElementById('btnListWeekly').style.background = viewMode === 'weekly' ? '#2b6cb0' : '#edf2f7';
            document.getElementById('btnListWeekly').style.color = viewMode === 'weekly' ? 'white' : '#2d3748';
            document.getElementById('btnListDaily').style.background = viewMode === 'daily' ? '#2b6cb0' : '#edf2f7';
            document.getElementById('btnListDaily').style.color = viewMode === 'daily' ? 'white' : '#2d3748';
        }

        // 6. Event Listeners
        document.getElementById('btnListWeekly').onclick = () => { viewMode = 'weekly'; updateURL(); renderView(); };
        document.getElementById('btnListDaily').onclick = () => { viewMode = 'daily'; updateURL(); renderView(); };
        
        document.getElementById('listPrev').onclick = () => {
            viewMode === 'weekly' ? anchorDate.setDate(anchorDate.getDate() - 7) : anchorDate.setDate(anchorDate.getDate() - 1);
            updateURL();
            renderView();
        };
        
        document.getElementById('listNext').onclick = () => {
            viewMode === 'weekly' ? anchorDate.setDate(anchorDate.getDate() + 7) : anchorDate.setDate(anchorDate.getDate() + 1);
            updateURL();
            renderView();
        };

        // Eksekusi awal
        fetchData();
    </script>
</body>
</html>
